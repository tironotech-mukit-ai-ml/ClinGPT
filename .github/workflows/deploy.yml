name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Free up disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Download Spacy model
        run: |
          python scripts/install_spacy.py || python -m spacy download en_core_web_lg
          echo "Spacy model downloaded successfully"

      - name: Run Django migrations
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DJANGO_SETTINGS_MODULE: config.settings
          DEBUG: True
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///db_test.sqlite3
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py migrate --noinput

      - name: Populate clinical guidelines
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DJANGO_SETTINGS_MODULE: config.settings
          DEBUG: True
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///db_test.sqlite3
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py populate_guidelines

      - name: Start Django server
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DJANGO_SETTINGS_MODULE: config.settings
          DEBUG: True
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///db_test.sqlite3
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py runserver 8001 &
          sleep 5
          echo "Django server started on port 8001"
      
      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DJANGO_SETTINGS_MODULE: config.settings
          DEBUG: True
          SECRET_KEY: test-secret-key-for-ci
        run: |
          python test_clin_gpt.py

  # Stage 2: Build and Push Docker Image
  build-and-push:
    name: Build and Push Docker Image
    needs: test  # Wait for tests to pass before building
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Free space on GitHub runner before building
      - name: ♻️ Prune Docker cache on runner
        run: |
          docker system prune -af || true
          docker builder prune -af || true
          docker volume prune -f || true
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        run: |
          echo "Built and pushed image with tags: latest, ${{ github.sha }}, ${SHORT_SHA}"

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    environment:
      name: production
    
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0        # ✅ upgraded
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.PROJECT_PATH }}

            IMAGE_REPO="ghcr.io/${{ github.repository }}"
            IMAGE_SHA="${{ github.sha }}"

            # Login to GHCR ONLY if your image is private (remove if public)
            if [ -n "${{ secrets.GHCR_PAT || '' }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            fi

            echo "Pulling exact image: ${IMAGE_REPO}:${IMAGE_SHA}"
            docker pull "${IMAGE_REPO}:${IMAGE_SHA}"          # ✅ immutable commit image

            echo "Tagging it locally as :latest for compose"
            docker tag "${IMAGE_REPO}:${IMAGE_SHA}" "${IMAGE_REPO}:latest"

            # Ensure .env.production exists, otherwise deployment will fail
            if [ ! -f .env.production ]; then
              echo "❌ ERROR: .env.production file not found!"
              echo "Please create .env.production on the server at: $(pwd)"
              exit 1
            fi

            echo "Updating IMAGE_TAG in .env.production"
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_SHA}/" .env.production

            echo "Stopping all existing containers (including old django-app1 project)"
            docker compose -f docker-compose.production.yml down 2>/dev/null || true
            docker stop inteam-ai-django inteam-ai-postgres inteam-ai-redis 2>/dev/null || true
            docker rm -f inteam-ai-django inteam-ai-postgres inteam-ai-redis 2>/dev/null || true

            echo "Starting database services only"
            docker compose -f docker-compose.production.yml up -d postgres redis

            echo "Waiting for databases to be ready..."
            sleep 15

            echo "Starting Django container directly with GHCR image (no compose build)"
            docker run -d \
              --name inteam-ai-django \
              --restart unless-stopped \
              --env-file .env.production \
              -e PYTHONUNBUFFERED=1 \
              -e DJANGO_SETTINGS_MODULE=config.settings \
              -v "$(pwd)/staticfiles:/app/staticfiles:Z" \
              -v "$(pwd)/media:/app/media:Z" \
              -v "$(pwd)/logs:/app/logs:Z" \
              -p 127.0.0.1:8001:8001 \
              --network django-app1_django_ai_network \
              --add-host host.docker.internal:host-gateway \
              "${IMAGE_REPO}:${IMAGE_SHA}" \
              sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear && gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 3 --worker-class gthread --threads 2 --timeout 120 --graceful-timeout 30 --max-requests 1000 --max-requests-jitter 100 --access-logfile - --error-logfile - --log-level info"

            echo "Waiting for Django to become healthy..."
            for i in {1..12}; do                            # ✅ retry up to ~60s
              if curl -fsS http://localhost:8001/health/ >/dev/null; then
                echo "✅ Healthy after $i checks"
                break
              fi
              sleep 5
              if [ "$i" -eq 12 ]; then
                echo "❌ Health check failed after 60s"
                docker logs --tail 200 inteam-ai-django
                exit 1
              fi
            done

            docker ps --filter "name=inteam-ai-"
            
            echo "🎉 Deployment completed successfully!"
      
      - name: Send deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "Deployed version: ${{ github.sha }}"
            echo "To rollback, use: Actions → Rollback → Run workflow → Enter SHA"
          else
            echo "❌ Deployment failed!"
            echo "Check logs above for details"
          fi
